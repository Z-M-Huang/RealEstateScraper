version: "3.1"

services:
  web:
    image: realestate
    build:
        context: .
        dockerfile: Dockerfile  
    restart: unless-stopped
    environment:
      - "REDIS_ADDR=${REDIS_ADDR}"
      - "CONNECTION_STRING=${CONNECTION_STRING}"
      - "DB_DRIVER=${DB_DRIVER}"
      - "TZ=America/New_York"
    networks:
      - proxy
        
networks:
  proxy:
    external: true
