name: Docker CI

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    name: deploy
    runs-on: self-hosted
    steps:      
    - uses: actions/checkout@v2
    - name: Deploy
      env:
        DB_DRIVER: ${{ secrets.DB_DRIVER }}
        REDIS_ADDR: ${{ secrets.REDIS_ADDR }}
        CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
        TRULIA_PROXY: ${{ secrets.TRULIA_PROXY }}
        TRULIA_PROXY_THREAD: ${{ secrets.TRULIA_PROXY_THREAD }}
      run: |
        export DB_DRIVER REDIS_ADDR CONNECTION_STRING TRULIA_PROXY TRULIA_PROXY_THREAD
        docker-compose up -d